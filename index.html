<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerPulse | Social Feed</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo">GAMER<span>PULSE</span></div>
        <nav>
            <button class="nav-btn">Início</button>
            <button class="nav-btn">Explorar</button>
            <button class="nav-btn active">Perfil</button>
        </nav>
    </header>

    <main class="container">
        <aside class="profile-card">
            <div class="profile-banner"></div>
            <div class="profile-info">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=GamerX" alt="Avatar" class="avatar">
                <h2>CyberGhost_99</h2>
                <p>Nível 42 | Mestre em RPGs</p>
                <div class="stats">
                    <span><strong>150</strong> Amigos</span>
                    <span><strong>12</strong> Conquistas</span>
                </div>
                <button class="edit-btn">Editar Perfil</button>
            </div>
        </aside>

        <section class="feed">
            <div class="post-card">
                <div class="post-header">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Neon" alt="User">
                    <div>
                        <h4>NeonViper</h4>
                        <span>há 2 horas</span>
                    </div>
                </div>
                <div class="post-content">
                    <p>Acabei de platinar o novo DLC de Elden Ring! O chefe final é insano. 🎮🔥</p>
                    <div class="post-image" style="background-image: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=600');"></div>
                </div>
                <div class="post-actions">
                    <button class="like-btn">❤️ Curtir</button>
                    <button class="comment-btn">💬 Comentar</button>
                </div>
            </div>

            <div class="post-card">
                <div class="post-header">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Pixel" alt="User">
                    <div>
                        <h4>PixelArtiste</h4>
                        <span>há 5 horas</span>
                    </div>
                </div>
                <div class="post-content">
                    <p>Alguém para fechar squad no Valorant hoje à noite? Rumo ao Imortal! 🚀</p>
                </div>
                <div class="post-actions">
                    <button class="like-btn">❤️ Curtir</button>
                    <button class="comment-btn">💬 Comentar</button>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
